- title: Research & Technical Projects
  type: time_table
  contents:
    - title: Roman Urdu Small Language Model (RU-SLM)
      description:
        - 4-bit QLoRA on an 8B model for low-resource conversational NLP; ~74% reduction in trainable parameters with deployable inference and a reproducible pipeline
    - title: Text Summarization Small Language Model (TS-SLM)
      description:
        - LoRA + 4-bit quantization on Mistral-7B for length-controlled abstractive news summarization; quality and hallucination evaluated via ROUGE and BERTScore
    - title: Multilingual Sentiment & Language Detection
      description:
        - PEFT-adapted Gemma-3 and Qwen-3 for joint language identification and sentiment classification across Urdu and Roman Urdu, with structured outputs and documented error modes

